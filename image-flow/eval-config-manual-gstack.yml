# gstack 变体专属的 manual-skill 配置（run-eval-manual-skill.sh 按变体名读取）
# 轮次划分与 superpowers/empty 剧本一一对应。gstack 是 web 全栈工作流工具箱
# （browser QA / spec / review / ship 等 53 个子 skill，260612 已提平布局）：
# R1 用 /spec（五阶段产出可执行 spec，gstack 的规划入口）；R2~R9 实施与 R10 验证
# 在 gstack 中没有执行/四检类对应命令，与 empty 同样不带前缀（先例：openspec R10/R11）；
# R11 用 /review（pre-landing review，与审查轮吻合）。
# 注意：gstack 内部脚本硬编码 ~/.claude/skills/gstack/bin/ 路径，在隔离
# CLAUDE_CONFIG_DIR 下不可解析（preamble 均有 || true 兜底）——这是该 skill 在
# 本评测装法下的固有行为，报告中须注明。
# 监工模式下 rounds 仅作剧本参考（实际提示词由评测员逐轮拼写），见 CLAUDE.md

extends: ../eval-common.yml

# 区分自主模式的目录前缀，实际目录为 eval-manual-<变体>-<时间戳>
dir_prefix: eval-manual

# 复制进测试目录的文件（与自主模式一致）
files:
  - src: agent-eval-spec.md
    dest: agent-eval-spec.md
  - src: grsai-api.md
    dest: docs/grsai-api.md

# 轮次剧本：按顺序逐轮发送，第 1 轮新会话，之后 --continue 续接
rounds:
  - |
    /spec 请阅读当前目录下的 agent-eval-spec.md（API 文档在 docs/grsai-api.md），以该文档为唯一需求输入，为其 §13 的 M1~M8 八个里程碑制定实施计划。本轮只做计划，不要开始写代码。全程不需要向我确认。
  - |
    按计划实施 M1（脚手架 + 端到端生成）：扩展骨架、右键 Markdown 触发生成、参考图解析（图生图）、多模型尺寸字段区分；可先用同步等待跑通端到端。完成后自行验证通过再结束本轮，全程不需要向我确认。
  - |
    按计划实施 M2（侧栏化与配置系统）：Webview 侧栏 + React 前端、配置自管（globalState + secrets）、三标签页、即时保存。完成后自行验证通过再结束本轮，全程不需要向我确认。
  - |
    按计划实施 M3（异步任务机制）：改为 replyType:async 提交 + 单定时器后台轮询 + globalState 持久化 + 重启续拉；多任务并发互不干扰。完成后自行验证通过再结束本轮，全程不需要向我确认。
  - |
    按计划实施 M4（素材库）：手动素材库（递归扫描、上限保护）与按 MD 路径逐层自动生成的「当前路径」库；右键缩略图插入相对引用（含空格路径 <> 包裹及解析端兼容）。完成后自行验证通过再结束本轮，全程不需要向我确认。
  - |
    按计划实施 M5（预览请求）：与真实提交共用请求体构造的预览文档，不调 API。完成后自行验证通过再结束本轮，全程不需要向我确认。
  - |
    按计划实施 M6（提示词注入）：modelInjections 配置 + 首次激活种入种子（不覆盖用户改动）+ IMAGES.md 注入，提交与预览两处生效。完成后自行验证通过再结束本轮，全程不需要向我确认。
  - |
    按计划实施 M7（体验打磨）：后台提交（点生成立即建卡不等网络）、进行中卡片进度条与逐秒计时、生效 MD 跟随活动编辑器（非 MD 标签不清空）、任务/历史合并倒序列表。完成后自行验证通过再结束本轮，全程不需要向我确认。
  - |
    按计划实施 M8（健壮性收尾）：响应运行时校验、瞬时错误重试判定、空文件夹清理、轮询重入锁、纯函数抽取与单元测试补齐。完成后自行验证通过再结束本轮，全程不需要向我确认。
  - |
    全部里程碑已完成。逐项运行 npm run compile、npm run check-types、npm run lint、npm test，确认全部通过；任何一项未通过都要修复后重新验证，直到全绿为止。全程不需要向我确认。
  - |
    /review 对整个 image-flow 扩展实现做一次完整代码审查，对照 agent-eval-spec.md 输出问题清单，并修复其中高优先级问题，修复后重跑全部检查确认仍然全绿。全程不需要向我确认。

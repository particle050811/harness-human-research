# Review Agent Tool Isolation — 共享白名单规范
# [来源: ADR-038 D11.1 + OpenDev arXiv 2603.05344 — Plan mode planner schema-level read-only exclusion]
#
# 这个文件不是 agent definition，而是**机器可读的白名单规范**。
# 所有审查类 agent 的 frontmatter 必须遵循这个白名单。
# 治理规则在 .claude/rules/review-agent-isolation.md。
#
# 关键原则：
# 1. 审查 agent 的工作是"看 + 报告"，不是"改"
# 2. schema-level 隔离比 prompt-level 约束可靠 100x（OpenDev 论文证据）
# 3. 不允许 Edit/Write/Bash/NotebookEdit — 这些有潜在副作用
# 4. WebFetch + Read + Grep + Glob 足够支持任何审查工作
#
# 适用范围（非穷尽）：
# - 任何 PR review / code review 类 agent
# - Stop hook 的 Evaluator subagent
# - Gate 2/4/6/8 审查 subagent
# - Silent failure / type design / security review 类 agent
# - Architectural consistency 检查 agent

version: 1.0.0
last_updated: "2026-04-07"
spec_source: "ADR-038 D11"

# ──────────────────────────────────────────────────────────────────────────
# 允许的工具（白名单 — 完整列表）
# ──────────────────────────────────────────────────────────────────────────
tools_allowed:
  # 信息读取
  - Read              # 读文件
  - Glob              # 文件路径模式匹配
  - Grep              # 内容搜索（内置 ripgrep）

  # 外部资源（只读）
  - WebFetch          # 查文档、ADR 引用、外部规范
  - WebSearch         # 搜索（不修改任何东西）

  # 自我管理（不影响 host 系统）
  - TodoWrite         # 自己的检查清单
  - TaskCreate        # 创建跟进 task
  - TaskUpdate        # 更新自己 task 状态
  - TaskList          # 查看 task 列表
  - TaskGet           # 读 task 详情

  # MCP 只读工具（按需选择）
  - mcp__towow__towow_*  # towow 协议查询（agents/demands/runs 等只读 tool）

# ──────────────────────────────────────────────────────────────────────────
# 禁用的工具（黑名单 — 必须显式拒绝）
# ──────────────────────────────────────────────────────────────────────────
tools_denied:
  # 写入类 — 一律拒绝
  - Edit              # 改文件
  - Write             # 写新文件
  - NotebookEdit      # 改 Jupyter notebook

  # Shell 类 — 一律拒绝（即使"只读"命令也可能有副作用）
  - Bash              # 包括 git push, rm, scp, npm install 等

  # Worktree / 长任务类 — 审查不应改 git 状态
  - EnterWorktree
  - ExitWorktree

  # 远程触发类 — 审查不应启动 cron
  - CronCreate
  - CronDelete

  # 写权限的 MCP 工具（按 MCP server 列出）
  - mcp__towow__towow_register
  - mcp__towow__towow_login
  - mcp__towow__towow_logout
  - mcp__towow__towow_*_create
  - mcp__towow__towow_*_delete
  - mcp__towow__towow_*_update
  - mcp__towow__towow_send_message
  - mcp__towow__towow_*_respond
  - mcp__towow__towow_*_confirm

# ──────────────────────────────────────────────────────────────────────────
# 候选 Bash 只读子集（v4 仅文档化，未实施 — 需要 PreToolUse hook 强制）
# ──────────────────────────────────────────────────────────────────────────
# 设计上 review agent 不应该用 Bash，但如果必须，只允许这些模式：
bash_allowed_patterns:
  - "git status"
  - "git diff*"
  - "git log*"
  - "git show*"
  - "git blame*"
  - "ls *"            # 应该用 Glob 替代

# ──────────────────────────────────────────────────────────────────────────
# 应用清单：哪些 agent 必须遵循
# ──────────────────────────────────────────────────────────────────────────
# 本地 / 插件 review agents（直接由 frontmatter 控制）：
#   - .claude/plugins/towow-review-toolkit/agents/reviewer.md (WP-040 backport；reference implementation)
#
# 插件 review agents（无法改 frontmatter，需要在调用层用约束 prompt 引用本规范）：
#   - pr-review-toolkit:code-reviewer
#   - pr-review-toolkit:silent-failure-hunter
#   - pr-review-toolkit:type-design-analyzer
#   - pr-review-toolkit:comment-analyzer
#   - pr-review-toolkit:pr-test-analyzer
#   - feature-dev:code-explorer
#   - feature-dev:code-reviewer
#
# Stop hook Evaluator (scripts/hooks/stop-evaluator.md)：
#   - 不是 subagent，而是 hook 注入的 prompt
#   - 该 prompt 不能调用任何工具（只输出文字反馈）

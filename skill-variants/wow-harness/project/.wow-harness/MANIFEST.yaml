# ---------------------------------------------------------------------------
# bash_read_keywords — Bash matcher read-only classification.
# Consumed by WP-11 sanitize-on-read.py and WP-SEC-1 test 12 (double-diff).
# ---------------------------------------------------------------------------

bash_read_keywords:
  - cat
  - head
  - tail
  - less
  - "git log"
  - "git show"
  - rg
  - grep
  - jq
  - cut
  - awk
  - sed

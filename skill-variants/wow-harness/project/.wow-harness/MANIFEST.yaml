# ---------------------------------------------------------------------------
# settings_command_registry — authoritative list of all hook commands
# declared in .claude/settings.json. Must match settings.json exactly.
# ---------------------------------------------------------------------------

settings_command_registry:
  - { stage: PostToolUse,        matcher: "Edit|Write", script: scripts/guard-feedback.py,                      timeout: 30 }
  - { stage: PostToolUse,        matcher: "Edit|Write", script: scripts/hooks/loop-detection.py,                timeout: 5  }
  - { stage: PostToolUse,        matcher: "Edit|Write", script: scripts/hooks/risk-tracker.py,                  timeout: 3  }
  - { stage: PreToolUse,         matcher: "Bash",       script: scripts/deploy-guard.py,                        timeout: 10 }
  - { stage: PreToolUse,         matcher: "Bash",       script: scripts/hooks/auto-python3.py,                  timeout: 5,  if: "Bash(python *)" }
  - { stage: PreToolUse,         matcher: "*",          script: scripts/hooks/tool-call-counter.py,             timeout: 3 }
  - { stage: PreToolUse,         matcher: "Task",       script: scripts/hooks/review-agent-gatekeeper.py,       timeout: 5 }
  - { stage: PreToolUse,         matcher: "Read|Bash",  script: scripts/hooks/sanitize-on-read.py,             timeout: 10 }
  - { stage: PreCompact,         matcher: "*",          script: scripts/hooks/precompact.sh,                    timeout: 5 }
  - { stage: SessionStart,       matcher: "*",          script: scripts/hooks/session-start-reset-risk.py,      timeout: 3 }
  - { stage: SessionStart,       matcher: "*",          script: scripts/hooks/session-start-magic-docs.py,      timeout: 10 }
  - { stage: SessionStart,       matcher: "*",          script: scripts/hooks/session-start-toolkit-reminder.py, timeout: 5 }
  - { stage: Stop,               matcher: "*",          script: scripts/hooks/stop-evaluator.py,                timeout: 10 }
  - { stage: SessionEnd,         matcher: "*",          script: scripts/hooks/session-reflection.py,            timeout: 10 }
  - { stage: SessionEnd,         matcher: "*",          script: scripts/hooks/trace-analyzer.py,                timeout: 30, args: "analyze --days 1 --min-samples 3" }
  - { stage: SessionEnd,         matcher: "*",          script: scripts/hooks/deploy-progress-on-session-end.py, timeout: 5 }
  - { stage: PostToolUseFailure, matcher: "*",          script: scripts/hooks/failure-analyzer.py,              timeout: 5 }

# ---------------------------------------------------------------------------
# rebaseline_triggers — WP-SEC-1 detect_rebaseline_triggers.py consumption.
# If a PR touches any of these, CI forces a plan-level rebaseline step.
# ---------------------------------------------------------------------------

rebaseline_triggers:
  - .wow-harness/MANIFEST.yaml
  - .wow-harness/issue-adapter.yaml
  - .wow-harness/deploy-allowlist.yaml
  - .claude/settings.json
  - scripts/lib/claim_patterns.py
  - scripts/sanitize.py
  # vNext / WP-040 backport (2026-04-29) — schema 真相源
  - .claude/plugins/towow-review-toolkit/contracts/review-contract.yaml
  - .claude/plugins/towow-mode-toolkit/contracts/mode-contract.md
  - .claude/agents/review-base.yaml
  - .towow/toolkit-index.yaml

# ---------------------------------------------------------------------------
# vNext_plugin_registry — WP-040 backport（2026-04-29 sync from Towow @ f3ad6585）
# H 系列引用消费的中间层；H5/H6 schema 落地点（review-contract.yaml）。
# 不在 settings_command_registry，因为 plugin hook 由 plugin.json 自注册。
# ---------------------------------------------------------------------------

vNext_plugin_registry:
  towow-review-toolkit:
    plugin_json: .claude/plugins/towow-review-toolkit/.claude-plugin/plugin.json
    reviewer_agent: .claude/plugins/towow-review-toolkit/agents/reviewer.md
    contracts:
      - .claude/plugins/towow-review-toolkit/contracts/review-contract.yaml
      - .claude/plugins/towow-review-toolkit/contracts/evidence-packet-schema.json
    hooks:
      - .claude/plugins/towow-review-toolkit/hooks/verify-gate.py   # Stop hook
  towow-mode-toolkit:
    plugin_json: .claude/plugins/towow-mode-toolkit/.claude-plugin/plugin.json
    contracts:
      - .claude/plugins/towow-mode-toolkit/contracts/mode-contract.md
    hooks:
      - .claude/plugins/towow-mode-toolkit/hooks/capability-router.py  # PreToolUse
      - .claude/plugins/towow-mode-toolkit/hooks/evidence-emit.py      # PostToolUse
    skills:
      - .claude/plugins/towow-mode-toolkit/skills/mode/SKILL.md
      - .claude/plugins/towow-mode-toolkit/skills/mode/transition.py
      - .claude/plugins/towow-mode-toolkit/skills/mode/build.sh
      - .claude/plugins/towow-mode-toolkit/skills/mode/plan.sh
      - .claude/plugins/towow-mode-toolkit/skills/mode/release.sh
      - .claude/plugins/towow-mode-toolkit/skills/mode/shadow-review.sh
      - .claude/plugins/towow-mode-toolkit/skills/mode/verify.sh
  toolkit_skill:
    skill: .claude/skills/toolkit/SKILL.md
    discover_script: .claude/skills/toolkit/list.sh


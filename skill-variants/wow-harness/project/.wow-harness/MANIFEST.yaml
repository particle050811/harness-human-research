# wow-harness install manifest — machine-readable truth source
#
# Owner: WP-01b (skeleton, manifest_version) + WP-03 (registry fill).
# WP-11 adds one PreToolUse Read/Bash matcher entry to
# settings_command_registry (+1 physical_files). WP-SEC-1 CI consumes
# rebaseline_triggers + bash_read_keywords.
#
# Schema: ADR-043 §4 + §13.5

manifest_version: "0.1.0"
schema_owner: "PLAN-086 WP-01b (skeleton) + WP-03 (registry fill)"
notes: >
  WP-01b wrote skeleton with empty registries. WP-03 filled L1-L5 and
  settings_command_registry. WP-11 increments physical_files to 18 when
  install skill lands. All field semantics defined in ADR-043 §4 + §13.5.

